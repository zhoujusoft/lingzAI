services:
  mysql-db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    volumes:
      - ./data/dev/mysql:/var/lib/mysql
      - ../backend/src/main/resources/db/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\" --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    ports:
      - "3306:3306"

  redis:
    image: redis:8.2.2
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
    command: ["redis-server", "/etc/redis/redis.conf"]
    volumes:
      - ./data/dev/redis:/data
      - ./config/redis/redis.conf:/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
    ports:
      - "16379:6379"

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - ./data/dev/minio:/data
    ports:
      - "19000:9000"
      - "19001:9001"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    restart: unless-stopped
    user: "0:0"
    environment:
      TZ: Asia/Shanghai
      discovery.type: single-node
      ES_JAVA_OPTS: ${ES_JAVA_OPTS:--Xms1g -Xmx1g}
      xpack.security.enabled: "false"
      xpack.security.http.ssl.enabled: "false"
      xpack.security.enrollment.enabled: "false"
    command:
      - /bin/bash
      - -c
      - chown -R 1000:0 /usr/share/elasticsearch/data && exec su elasticsearch -s /bin/bash -c '/usr/local/bin/docker-entrypoint.sh eswrapper'
    volumes:
      - ./data/dev/elasticsearch:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9200 >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 30s
    ports:
      - "9200:9200"
      - "9300:9300"
