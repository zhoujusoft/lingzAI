services:
  frontend:
    restart: unless-stopped
    image: ${REGISTRY:-125.75.152.167:5001}/${FRONTEND_IMAGE_NAME:-lingzhou-frontend}:${IMAGE_TAG:-1.1.0}
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"

  backend:
    restart: unless-stopped
    image: ${REGISTRY:-125.75.152.167:5001}/${BACKEND_IMAGE_NAME:-lingzhou-backend}:${IMAGE_TAG:-1.1.0}
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      SERVER_PORT: 5050
      SERVER_SERVLET_CONTEXT_PATH: /api
      SKILL_ROOT: /app/skills
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=UTF-8&serverTimezone=GMT%2B8&zeroDateTimeBehavior=convertToNull
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
      APP_CHAT_MEMORY_TYPE: ${APP_CHAT_MEMORY_TYPE:-in-memory}
      APP_EMBEDDING_DIMENSIONS: ${APP_EMBEDDING_DIMENSIONS:-1024}
      APP_RAG_ELASTICSEARCH_BASE_URL: http://elasticsearch:9200
      APP_RAG_ELASTICSEARCH_INDEX_NAME: ${APP_RAG_ELASTICSEARCH_INDEX_NAME:-rag_chunks}
      APP_RAG_ELASTICSEARCH_DIMENSIONS: ${APP_RAG_ELASTICSEARCH_DIMENSIONS:-1024}
      APP_RAG_ELASTICSEARCH_SIMILARITY: ${APP_RAG_ELASTICSEARCH_SIMILARITY:-cosine}
      APP_RAG_ELASTICSEARCH_SHARDS: ${APP_RAG_ELASTICSEARCH_SHARDS:-1}
      APP_RAG_ELASTICSEARCH_REPLICAS: ${APP_RAG_ELASTICSEARCH_REPLICAS:-0}
      APP_RAG_RERANK_TIMEOUT_MS: ${APP_RAG_RERANK_TIMEOUT_MS:-1200}
      APP_RAG_RERANK_FALLBACK_RRF: ${APP_RAG_RERANK_FALLBACK_RRF:-true}
      MODEL_QWEN_CHAT_TEMPERATURE: ${MODEL_QWEN_CHAT_TEMPERATURE:-}
      MODEL_QWEN_CHAT_MAX_TOKENS: ${MODEL_QWEN_CHAT_MAX_TOKENS:-}
      MODEL_QWEN_CHAT_SYSTEM_PROMPT: ${MODEL_QWEN_CHAT_SYSTEM_PROMPT:-}
      MODEL_QWEN_CHAT_ENABLE_THINKING: ${MODEL_QWEN_CHAT_ENABLE_THINKING:-false}
      MODEL_QWEN_EMBEDDING_DIMENSIONS: ${MODEL_QWEN_EMBEDDING_DIMENSIONS:-1024}
      MODEL_QWEN_RERANK_PROTOCOL: ${MODEL_QWEN_RERANK_PROTOCOL:-dashscope}
      MODEL_QWEN_RERANK_TIMEOUT_MS: ${MODEL_QWEN_RERANK_TIMEOUT_MS:-1200}
      MODEL_QWEN_RERANK_FALLBACK_RRF: ${MODEL_QWEN_RERANK_FALLBACK_RRF:-true}
      MODEL_VLLM_CHAT_TEMPERATURE: ${MODEL_VLLM_CHAT_TEMPERATURE:-0.7}
      MODEL_VLLM_CHAT_MAX_TOKENS: ${MODEL_VLLM_CHAT_MAX_TOKENS:-20000}
      MODEL_VLLM_CHAT_SYSTEM_PROMPT: ${MODEL_VLLM_CHAT_SYSTEM_PROMPT:-}
      MODEL_VLLM_CHAT_ENABLE_THINKING: ${MODEL_VLLM_CHAT_ENABLE_THINKING:-false}
      MODEL_VLLM_EMBEDDING_DIMENSIONS: ${MODEL_VLLM_EMBEDDING_DIMENSIONS:-0}
      MODEL_VLLM_RERANK_PROTOCOL: ${MODEL_VLLM_RERANK_PROTOCOL:-vllm}
      MODEL_VLLM_RERANK_TIMEOUT_MS: ${MODEL_VLLM_RERANK_TIMEOUT_MS:-1200}
      MODEL_VLLM_RERANK_FALLBACK_RRF: ${MODEL_VLLM_RERANK_FALLBACK_RRF:-true}
    volumes:
      - ./data/backend/uploads:/app/uploads
      - ./data/backend/skills:/app/skills
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      minio:
        condition: service_started

  mysql:
    restart: unless-stopped
    image: mysql:8.0
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    volumes:
      - ./data/mysql:/var/lib/mysql
      - ./db/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\" --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    ports:
      - "${MYSQL_PORT:-3306}:3306"

  redis:
    restart: unless-stopped
    image: redis:8.2.2
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - ./data/redis:/data
      - ./config/redis/redis.conf:/etc/redis/redis.conf:ro
    command: ["redis-server", "/etc/redis/redis.conf"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12

  minio:
    restart: unless-stopped
    image: minio/minio:latest
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - ./data/minio:/data
    command: server /data --console-address ":9001"

  elasticsearch:
    restart: unless-stopped
    image: 125.75.152.167:5001/lingzhou-es:8.12.0
    user: "0:0"
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      discovery.type: single-node
      ES_JAVA_OPTS: ${ES_JAVA_OPTS:--Xms1g -Xmx1g}
      xpack.security.enabled: "false"
      xpack.security.http.ssl.enabled: "false"
      xpack.security.enrollment.enabled: "false"
    command:
      - /bin/bash
      - -c
      - chown -R 1000:0 /usr/share/elasticsearch/data && exec su elasticsearch -s /bin/bash -c '/usr/local/bin/docker-entrypoint.sh eswrapper'
    volumes:
      - ./data/elasticsearch:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9200 >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 30s
